{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block header %}{% endblock %}
{% block content %}
<a class="back-link" href="{{ url_for('main.index') }}">Назад</a>
<section class="form-shell auth-shell">
    <h1>Вход</h1>
    <form method="post" class="form">
        {{ form.hidden_tag() }}
        <label>Почта/номер телефона
            <input name="login" required value="{{ form.login.data or '' }}" class="{% if form.login.errors %}is-invalid{% endif %}">
            {% for err in form.login.errors %}<span class="field-error">{{ err }}</span>{% endfor %}
        </label>
        <label>Пароль
            <input type="password" name="password" required class="{% if form.password.errors %}is-invalid{% endif %}">
            {% for err in form.password.errors %}<span class="field-error">{{ err }}</span>{% endfor %}
        </label>
        <button class="button primary" type="submit">{{ form.submit.label.text }}</button>
    </form>
    <a class="muted-link" href="{{ url_for('main.register') }}">Создать аккаунт</a>
</section>
{% endblock %}
