{% extends "base.html" %}
{% block title %}Бронирование{% endblock %}
{% block content %}
<section class="form-shell wide booking-shell">
    <h1>Бронирование</h1>
    <form method="post" class="booking-layout" id="booking-form">
        <div class="room-picker">
            <label class="room-option">
                <input type="radio" name="room_type" value="Стандарт" data-price="{{ room_prices['Стандарт'] }}" required>
                <img src="{{ url_for('static', filename='images/design/room_standard.jpg') }}" alt="Стандарт">
            </label>
            <label class="room-option">
                <input type="radio" name="room_type" value="Комфорт" data-price="{{ room_prices['Комфорт'] }}">
                <img src="{{ url_for('static', filename='images/design/room_comfort.jpg') }}" alt="Комфорт">
            </label>
            <label class="room-option">
                <input type="radio" name="room_type" value="Люкс" data-price="{{ room_prices['Люкс'] }}">
                <img src="{{ url_for('static', filename='images/design/room_luxe.jpg') }}" alt="Люкс">
            </label>
        </div>
        <div class="form booking-fields">
            <label>Дата заезда: <input type="date" name="check_in" id="check_in" required></label>
            <label>Дата выезда: <input type="date" name="check_out" id="check_out" required></label>
            <label>Количество взрослых гостей: <input type="number" name="adults" min="1" value="1" required></label>
            <label>Количество детей (до 14 лет): <input type="number" name="children" id="children" min="0" value="0"></label>
            <div class="summary">
                <p>Дней проживания: <strong id="days">0</strong></p>
                <p>Стоимость: <strong id="price">0</strong></p>
            </div>
            <button class="button primary" type="submit">Забронировать</button>
        </div>
    </form>
</section>
<script src="{{ url_for('static', filename='js/booking.js') }}"></script>
{% endblock %}
